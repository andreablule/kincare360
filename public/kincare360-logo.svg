  <circle cx="29" cy="24" r="4" fill="white" opacity="0.95"/>
  <path d="M23 38 C23 32 26 30 29 30 C32 30 35 32 35 38" fill="white" opacity="0.95"/>

  <!-- Child figure right -->
  <circle cx="42" cy="27" r="3" fill="white" opacity="0.95"/>
  <path d="M37 38 C37 33 39.5 31 42 31 C44.5 31 47 33 47 38" fill="white" opacity="0.95"/>

  <!-- Holding hands line -->
  <line x1="35" y1="34" x2="37" y2="34" stroke="white" stroke-width="1.5" opacity="0.9"/>

  <!-- Brand name -->
  <text x="76" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#0d4f5c">Kin</text>
  <text x="109" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#0EA5A0">Care</text>
  <text x="153" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#22C55E">360</text>

  <!-- Tagline -->
  <text x="76" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748b" letter-spacing="0.3">Complete Care Coordination for Families</text>
</svg>
